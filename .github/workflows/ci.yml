name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Go build, vet, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: gofmt (no files may need formatting)
        run: test -z "$(gofmt -l .)"
      - run: go vet ./...
      - run: go build ./...
      # Full suite runs here because Windows Application Control blocks fresh
      # Go test binaries on the dev host; CI (Linux) is the authoritative gate.
      - run: go test ./...
